<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE SHAPE | Rock Paper Scissors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">BATTLE SHAPE</div>
        <div class="lang-dropdown" id="lang-dropdown">
            <button class="lang-trigger" id="lang-current">🇺🇸</button>
            <div class="lang-options">
                <button class="lang-btn" data-lang="en">🇺🇸 English</button>
                <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="pt">🇵🇹 Português</button>
            </div>
        </div>
        
        <div class="header-right">
            <button id="music-toggle" class="music-btn">🔊</button>
            <div class="balance-chip">
                <span id="user-balance">0.00</span> <span>USDC</span>
            </div>
        </div>
    </header>

    <audio id="bg-music" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73456.mp3" type="audio/mpeg">
    </audio>

    <main>
        <h1 class="game-title" data-i18n="game-title">Battle!</h1>
        <p class="game-subtitle" data-i18n="game-subtitle">Make your move to start the shape match</p>
        <div id="result-banner" class="result-banner hidden">
            <h1 id="winner-text">YOU WON!</h1>
            <p id="winner-amount">+195.00 USDC</p>
        </div>

        <div class="arena-card">
            <div class="arena-header">
                <div class="phase-chip" id="phase-chip" data-i18n="phase-committing">COMMITTING</div>
            </div>
            
            <div class="match-players">
                <div class="player-slot">
                    <div class="avatar" id="p1-avatar">
                        <img src="p1.png" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        <span id="p1-move-icon" class="hidden" style="position: absolute; bottom: -10px; right: -10px; font-size: 24px;"></span>
                    </div>
                    <label data-i18n="p1-label" style="font-size: 10px; margin-top: 8px; display: block; font-weight: 700;">YOU</label>
                    <div id="p1-status" data-i18n="awaiting" style="font-size: 9px; margin-top: 4px; color: var(--on-surface-variant);">Awaiting...</div>
                </div>

                <div class="vs-badge">VS</div>

                <div class="player-slot">
                    <div class="avatar" id="p2-avatar">
                        <img src="p2.png" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        <span id="p2-move-icon" class="hidden" style="position: absolute; bottom: -10px; left: -10px; font-size: 24px;"></span>
                    </div>
                    <label data-i18n="p2-label" style="font-size: 10px; margin-top: 8px; display: block; font-weight: 700;">SHAPE MASTER</label>
                    <div id="p2-status" data-i18n="thinking" style="font-size: 9px; margin-top: 4px; color: var(--on-surface-variant);">Thinking...</div>
                </div>
            </div>

            <div class="selection-grid" id="move-controls">
                <button class="move-card rps-btn" data-move="rock">
                    <span class="move-emoji">✊</span>
                    <span class="move-label" data-i18n="rock">ROCK</span>
                </button>
                <button class="move-card rps-btn" data-move="paper">
                    <span class="move-emoji">🖐️</span>
                    <span class="move-label" data-i18n="paper">PAPER</span>
                </button>
                <button class="move-card rps-btn" data-move="scissors">
                    <span class="move-emoji">✌️</span>
                    <span class="move-label" data-i18n="scissors">SCISSORS</span>
                </button>
            </div>
        </div>

        <div class="animation-stage hidden" id="animation-overlay">
            <div id="p1-anim-hand" style="font-size: 80px;">✊</div>
            <div id="p2-anim-hand" style="font-size: 80px;">✊</div>
        </div>

        <div id="recon-msg" class="hidden" data-i18n="syncing" style="margin-top: 20px; font-size: 11px; font-weight: 700; color: var(--primary);">
            SYNCING PAYOUT...
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
