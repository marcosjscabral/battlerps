<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE SHAPE | Rock Paper Scissors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css?v=2.8">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">BATTLE SHAPE</div>
        <div class="lang-dropdown" id="lang-dropdown">
            <button class="lang-trigger" id="lang-current">🇺🇸</button>
            <div class="lang-options">
                <button class="lang-btn" data-lang="en">🇺🇸 English</button>
                <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="pt">🇵🇹 Português</button>
            </div>
        </div>

        <div class="header-right">
            <div class="balance-chip">
                <span id="user-balance">0.00</span> <span>USDC</span>
            </div>
            <div class="volume-control">
                <button id="music-toggle" class="music-btn">🔊</button>
                <div class="volume-slider-box">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>
        </div>
    </header>

    <audio id="bg-music" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73456.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfx-bounce" preload="auto">
        <source src="https://cdn.pixabay.com/audio/2021/08/04/audio_bbdec39201.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfx-reveal" preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_f7c8f2b380.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfx-win" preload="auto">
        <source src="https://pixabay.com/static/audio/2021/08/04/audio_3ea348a5c3.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfx-loss" preload="auto">
        <source src="https://pixabay.com/static/audio/2021/08/04/audio_5e29699f84.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfx-draw" preload="auto">
        <source src="https://pixabay.com/static/audio/2022/03/15/audio_1081665a3c.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfx-click" preload="auto">
        <source src="https://pixabay.com/static/audio/2022/03/13/audio_0867d7a414.mp3" type="audio/mpeg">
    </audio>

    <main>
        <h1 class="game-title" data-i18n="game-title">Battle!</h1>
        <p class="game-subtitle" data-i18n="game-subtitle">Make your move to start the shape match</p>

        <div class="mode-selector">
            <button id="btn-mode-bot" class="mode-btn active" data-mode="bot">🆚 BOT</button>
            <button id="btn-mode-pvp" class="mode-btn" data-mode="pvp">👥 PVP <span
                    class="badge-new">NEW</span></button>
        </div>

        <div id="pvp-status" class="pvp-status-bar hidden">
            <span class="searching-dot"></span>
            <span id="pvp-status-text">Searching for opponent...</span>
            <span id="pvp-timer" class="pvp-timer hidden">5s</span>
        </div>

        <div id="username-overlay" class="username-overlay hidden">
            <div class="username-card">
                <h2>BATTLE ID</h2>
                <p>Choose your unique @handle to join the arena</p>
                <div class="input-group">
                    <span class="handle-prefix">@</span>
                    <input type="text" id="username-input" placeholder="nickname" maxlength="20">
                </div>
                <button id="btn-save-username" class="battle-btn">JOIN ARENA</button>
                <p id="username-error" class="error-msg hidden"></p>
            </div>
        </div>

        <div class="arena-card">
            <div class="result-area">
                <div id="result-banner" class="result-banner hidden">
                    <h1 id="winner-text">YOU WON!</h1>
                </div>
            </div>

            <div class="arena-header">
                <div class="phase-chip" id="phase-chip" data-i18n="phase-committing">COMMITTING</div>
            </div>

            <div class="score-board">
                <div class="score-item win">
                    <span class="score-label" data-i18n="score-wins">WINS</span>
                    <span id="score-win-count" class="score-value">0</span>
                </div>
                <div class="score-divider"></div>
                <div class="score-item draw">
                    <span class="score-label" data-i18n="score-draws">DRAWS</span>
                    <span id="score-draw-count" class="score-value">0</span>
                </div>
                <div class="score-divider"></div>
                <div class="score-item loss">
                    <span class="score-label" data-i18n="score-losses">LOSSES</span>
                    <span id="score-loss-count" class="score-value">0</span>
                </div>
            </div>

            <div class="players-row">
                <div class="player-unit">
                    <div class="avatar-box">
                        <img src="https://fjjkqwmuycnuzalaeszs.supabase.co/storage/v1/object/public/avatars/avatar_p1.png"
                            alt="P1" class="avatar-img">
                    </div>
                    <div id="p1-label" class="player-name">@YOU</div>
                    <div id="p1-status" class="player-status" data-i18n="awaiting">Awaiting...</div>
                </div>

                <div class="vs-symbol">VS</div>

                <div class="player-unit">
                    <div class="avatar-box">
                        <img src="https://fjjkqwmuycnuzalaeszs.supabase.co/storage/v1/object/public/avatars/avatar_p2.png"
                            alt="P2" class="avatar-img">
                    </div>
                    <div id="p2-label" class="player-name" data-i18n="p2-label">SHAPE MASTER</div>
                    <div id="p2-status" class="player-status" data-i18n="thinking">Thinking...</div>
                </div>
            </div>

            <div class="selection-grid" id="move-controls">
                <button class="move-card rps-btn" data-move="rock">
                    <span class="move-emoji">✊</span>
                    <span class="move-label" data-i18n="rock">ROCK</span>
                </button>
                <button class="move-card rps-btn" data-move="paper">
                    <span class="move-emoji">🖐️</span>
                    <span class="move-label" data-i18n="paper">PAPER</span>
                </button>
                <button class="move-card rps-btn" data-move="scissors">
                    <span class="move-emoji">✌️</span>
                    <span class="move-label" data-i18n="scissors">SCISSORS</span>
                </button>
            </div>
        </div>

        <div id="recon-msg" class="recon-payout hidden" data-i18n="syncing">SYNCING PAYOUT...</div>
    </main>

    <!-- Animation Overlay -->
    <div id="animation-overlay" class="animation-overlay hidden">
        <div class="arena-hands">
            <div id="p1-anim-hand" class="hand">✊</div>
            <div id="p2-anim-hand" class="hand">✊</div>
        </div>
    </div>

    <script src="app.js?v=2.8"></script>
</body>

</html>
